<!DOCTYPE html>
<html lang="en" data-theme="light" data-scheme="green">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="CalorieLens — AI-powered calorie & macro tracker">
  <meta name="theme-color" content="#1a6b46">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>CalorieLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<!-- ═══ SETUP WIZARD ═══════════════════════════════════════════════════════ -->
<div id="setup-wizard" style="display:none">
  <div class="wizard-header">
    <div class="wizard-progress-wrap">
      <div class="wizard-progress-bar" id="wizard-progress" style="width:20%"></div>
    </div>
    <div class="wizard-header-row">
      <span id="wizard-step-label" class="wizard-step-label">Step 1 of 5</span>
    </div>
  </div>
  <div class="wizard-body">
    <div id="wizard-content"></div>
  </div>
  <div class="wizard-footer">
    <button class="btn-ghost wizard-back-btn" id="wizard-back" style="visibility:hidden">
      <span class="material-symbols-rounded">arrow_back</span> Back
    </button>
    <button class="btn-primary flex-1" id="wizard-next">Continue</button>
  </div>
</div>

<!-- ═══ MAIN APP ════════════════════════════════════════════════════════════ -->
<div id="app-shell" style="display:none">
  <main id="main-content" role="main" aria-live="polite"></main>

  <nav class="nav-bar" role="navigation" aria-label="Main navigation">
    <button class="nav-item" data-page="dashboard" onclick="App.navigate('dashboard')">
      <span class="nav-pill"><span class="material-symbols-rounded">home</span></span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item" data-page="scan" onclick="App.navigate('scan')">
      <span class="nav-pill"><span class="material-symbols-rounded">photo_camera</span></span>
      <span class="nav-label">Scan</span>
    </button>
    <button class="nav-item" data-page="log" onclick="App.navigate('log')">
      <span class="nav-pill"><span class="material-symbols-rounded">list_alt</span></span>
      <span class="nav-label">Log</span>
    </button>
    <button class="nav-item" data-page="progress" onclick="App.navigate('progress')">
      <span class="nav-pill"><span class="material-symbols-rounded">monitoring</span></span>
      <span class="nav-label">Progress</span>
    </button>
    <button class="nav-item" data-page="settings" onclick="App.navigate('settings')">
      <span class="nav-pill"><span class="material-symbols-rounded">settings</span></span>
      <span class="nav-label">Settings</span>
    </button>
  </nav>
</div>

<div id="toast-container" role="alert" aria-live="polite"></div>

<script src="storage.js"></script>
<script src="api.js"></script>
<script src="ui.js"></script>
<script src="main.js"></script>
</body>
</html>
